apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayBackend
metadata:
  name: xai-grok
  namespace: agentgateway-system
spec:
  ai:
    provider:
      openai:
        model: grok-4.3
      host: api.x.ai
      port: 443
      pathPrefix: /v1
  policies:
    auth:
      secretRef:
        name: xai-secret
    tls:
      sni: api.x.ai
