apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: dgx-spark-llm
  namespace: agentgateway-system
spec:
  parentRefs:
    - name: dgx-spark-gateway
      namespace: agentgateway-system
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /spark
      backendRefs:
        - name: dgx-spark-llm
          namespace: agentgateway-system
          group: agentgateway.dev
          kind: AgentgatewayBackend
