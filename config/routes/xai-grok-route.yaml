apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: xai-grok
  namespace: agentgateway-system
spec:
  parentRefs:
    - name: xai-grok-gateway
      namespace: agentgateway-system
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /grok
      backendRefs:
        - name: xai-grok
          namespace: agentgateway-system
          group: agentgateway.dev
          kind: AgentgatewayBackend
