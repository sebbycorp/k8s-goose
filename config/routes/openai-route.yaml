# HTTPRoute — maps incoming requests at /openai path prefix to the OpenAI backend.
# Attaches to the agentgateway-proxy Gateway.
# Requests to /openai/v1/chat/completions will be proxied to OpenAI.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: openai
  namespace: agentgateway-system
spec:
  parentRefs:
    - name: agentgateway-proxy
      namespace: agentgateway-system
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /openai
      backendRefs:
        - name: openai
          namespace: agentgateway-system
          group: agentgateway.dev
          kind: AgentgatewayBackend
