# EnterpriseAgentgatewayPolicy — enables distributed tracing on the gateway.
# Sends traces to the Solo Enterprise telemetry collector (deployed by the UI chart)
# via OpenTelemetry gRPC on port 4317. Random sampling captures all requests.
apiVersion: enterpriseagentgateway.solo.io/v1alpha1
kind: EnterpriseAgentgatewayPolicy
metadata:
  name: tracing
  namespace: agentgateway-system
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: agentgateway-proxy
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: dgx-spark-gateway
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: xai-grok-gateway
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: virtual-mcp-gateway
  frontend:
    tracing:
      backendRef:
        name: solo-enterprise-telemetry-collector
        namespace: agentgateway-system
        kind: Service
        port: 4317
      randomSampling: "true"
