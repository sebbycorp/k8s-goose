# ExternalSecret — syncs the OpenAI API key from Vault into a K8s Secret.
# Creates the same 'openai-secret' that AgentgatewayBackend references,
# but sourced from Vault instead of stored in Git.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: openai-secret
  namespace: agentgateway-system
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: vault
    kind: ClusterSecretStore
  target:
    name: openai-secret
    creationPolicy: Owner
  data:
    - secretKey: Authorization
      remoteRef:
        key: llm-keys/openai
        property: Authorization
