apiVersion: apps/v1
kind: Deployment
metadata:
  name: otel-fanout-collector
  namespace: agentgateway-system
  labels:
    app: otel-fanout-collector
spec:
  replicas: 1
  selector:
    matchLabels:
      app: otel-fanout-collector
  template:
    metadata:
      labels:
        app: otel-fanout-collector
    spec:
      containers:
        - name: otel-collector
          image: otel/opentelemetry-collector-contrib:0.153.0
          args: ["--config=/conf/config.yaml"]
          env:
            - name: LANGFUSE_AUTH
              valueFrom:
                secretKeyRef:
                  name: langfuse-otel-auth
                  key: LANGFUSE_AUTH
          ports:
            - name: otlp-grpc
              containerPort: 4317
          volumeMounts:
            - name: config
              mountPath: /conf
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 256Mi
      volumes:
        - name: config
          configMap:
            name: otel-fanout-collector
