# Gateway — the proxy instance that receives all inbound traffic.
# Uses the enterprise-agentgateway GatewayClass (auto-created by the Helm chart).
# Listens on port 80 HTTP and accepts routes from all namespaces.
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: agentgateway-proxy
  namespace: agentgateway-system
spec:
  gatewayClassName: enterprise-agentgateway
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: All
