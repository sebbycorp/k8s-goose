apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: vault
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "4"
spec:
  project: default
  source:
    chart: vault
    repoURL: https://helm.releases.hashicorp.com
    targetRevision: 0.32.0
    helm:
      parameters:
        - name: server.dev.enabled
          value: "true"
        - name: server.dev.devRootToken
          value: "root"
        - name: injector.enabled
          value: "false"
        - name: ui.enabled
          value: "true"
        - name: ui.serviceType
          value: "NodePort"
  destination:
    namespace: vault
    server: https://kubernetes.default.svc
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
