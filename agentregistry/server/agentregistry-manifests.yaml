# Source: agentregistry/templates/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: agentregistry
  labels:
    helm.sh/chart: agentregistry-0.3.3
    app.kubernetes.io/name: agentregistry
    app.kubernetes.io/instance: agentregistry
    app.kubernetes.io/component: server
    app.kubernetes.io/version: "0.3.3"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/part-of: agentregistry
spec:
  replicas: 1
  revisionHistoryLimit: 10
  strategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app.kubernetes.io/name: agentregistry
      app.kubernetes.io/instance: agentregistry
      app.kubernetes.io/component: server
  template:
    metadata:
      annotations:
        checksum/config: 0338b8bf9d15ac6263631ae9c89c177d63b8c8dd2aa0b31b1dbbc585a4bdbcf2
        checksum/secret: 5f462cfc47ad50c102cb76596817e367212f3be7e1009ef8004243f57b6e3d8e
        checksum/postgresql-secret: a73c45663a04a470d3dc3f50a6d7d5af37737513c20ced2c2e6d6486b66b7fc8
      labels:
        app.kubernetes.io/name: agentregistry
        app.kubernetes.io/instance: agentregistry
        app.kubernetes.io/component: server
    spec:
      
      serviceAccountName: agentregistry
      automountServiceAccountToken: true
      securityContext:
        fsGroup: 1001
        fsGroupChangePolicy: Always
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - podAffinityTerm:
              labelSelector:
                matchLabels:
                  app.kubernetes.io/component: server
                  app.kubernetes.io/instance: agentregistry
                  app.kubernetes.io/name: agentregistry
              topologyKey: kubernetes.io/hostname
            weight: 1
      initContainers:
        - name: wait-for-postgres
          image: pgvector/pgvector:pg17
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - |
              until pg_isready -h agentregistry-postgresql -p 5432 -U agentregistry; do
                echo "waiting for postgres..."; sleep 2
              done
      containers:
        - name: agentregistry
          image: ghcr.io/agentregistry-dev/agentregistry/server:0.3.3
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
              - ALL
            readOnlyRootFilesystem: true
            runAsGroup: 1001
            runAsNonRoot: true
            runAsUser: 1001
            seccompProfile:
              type: RuntimeDefault
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
            - name: grpc
              containerPort: 21212
              protocol: TCP
            - name: mcp
              containerPort: 31313
              protocol: TCP
          envFrom:
            - configMapRef:
                name: agentregistry-config
          env:
            - name: AGENT_REGISTRY_JWT_PRIVATE_KEY
              valueFrom:
                secretKeyRef:
                  name: agentregistry
                  key: AGENT_REGISTRY_JWT_PRIVATE_KEY
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: agentregistry-postgresql
                  key: POSTGRES_PASSWORD
            - name: AGENT_REGISTRY_DATABASE_URL
              value: "postgres://agentregistry:$(POSTGRES_PASSWORD)@agentregistry-postgresql:5432/agentregistry?sslmode=disable"
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
            successThreshold: 1
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
            successThreshold: 1
          startupProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 30
            successThreshold: 1
          resources:
            limits:
              cpu: "1"
              memory: 1Gi
            requests:
              cpu: 250m
              memory: 256Mi
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
---
# Source: agentregistry/templates/postgresql.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: agentregistry-postgresql
  labels:
    helm.sh/chart: agentregistry-0.3.3
    app.kubernetes.io/name: agentregistry
    app.kubernetes.io/instance: agentregistry
    app.kubernetes.io/component: database
    app.kubernetes.io/version: "0.3.3"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/part-of: agentregistry
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: agentregistry
      app.kubernetes.io/instance: agentregistry
      app.kubernetes.io/component: database
  template:
    metadata:
      labels:
        app.kubernetes.io/name: agentregistry
        app.kubernetes.io/instance: agentregistry
        app.kubernetes.io/component: database
    spec:
      securityContext:
        fsGroup: 999
        runAsUser: 999
        runAsGroup: 999
        runAsNonRoot: true
      containers:
        - name: postgresql
          image: pgvector/pgvector:pg17
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
          ports:
            - name: postgresql
              containerPort: 5432
              protocol: TCP
          env:
            - name: POSTGRES_DB
              value: "agentregistry"
            - name: POSTGRES_USER
              value: "agentregistry"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: agentregistry-postgresql
                  key: POSTGRES_PASSWORD
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - agentregistry
                - -d
                - agentregistry
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
            successThreshold: 1
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - agentregistry
                - -d
                - agentregistry
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
            successThreshold: 1
          resources:
            limits:
              cpu: "1"
              memory: 1Gi
            requests:
              cpu: 250m
              memory: 256Mi
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: data
          emptyDir: {}
