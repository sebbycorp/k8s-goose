apiVersion: v1
kind: ConfigMap
metadata:
  name: agentregistry-registrations
  namespace: agentgateway-system
data:
  mcp-server-everything.json: |
    {
      "$schema": "https://static.modelcontextprotocol.io/schemas/2025-10-17/server.schema.json",
      "name": "agentgateway.dev/mcp-server-everything",
      "description": "Demo MCP server with sample tools, resources, and prompts",
      "version": "1.0.0"
    }
  mcp-website-fetcher.json: |
    {
      "$schema": "https://static.modelcontextprotocol.io/schemas/2025-10-17/server.schema.json",
      "name": "agentgateway.dev/mcp-website-fetcher",
      "description": "Fetches and extracts content from websites via MCP",
      "version": "1.0.0"
    }
---
apiVersion: batch/v1
kind: Job
metadata:
  name: agentregistry-register-mcpservers
  namespace: agentgateway-system
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 300
  template:
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-registry
          image: curlimages/curl:8.13.0
          command:
            - sh
            - -c
            - |
              echo "Waiting for AgentRegistry to be ready..."
              until curl -so /dev/null http://agentregistry.agentgateway-system.svc.cluster.local:12121/v0/health; do
                echo "AgentRegistry not ready, retrying in 5s..."
                sleep 5
              done
              echo "AgentRegistry is ready!"
      containers:
        - name: register
          image: curlimages/curl:8.13.0
          command:
            - sh
            - -c
            - |
              REGISTRY_URL="http://agentregistry.agentgateway-system.svc.cluster.local:12121"
              echo "Registering MCP servers with AgentRegistry..."
              for manifest in /registrations/*.json; do
                echo "--- Registering $(basename $manifest) ---"
                curl -s -X POST \
                  -H "Content-Type: application/json" \
                  -d @"$manifest" \
                  "$REGISTRY_URL/v0/servers"
                echo ""
              done
              echo "All registrations complete!"
          volumeMounts:
            - name: registrations
              mountPath: /registrations
              readOnly: true
      volumes:
        - name: registrations
          configMap:
            name: agentregistry-registrations
